<p class="font-body-md text-on-surface-variant mt-2 tracking-wide">Master your voice with precision.</p>

<!-- Soft Glow behind the card -->
<div class="absolute -inset-1 bg-primary-container/10 blur-2xl -z-10 rounded-xl"></div>
<form class="space-y-stack-md">
<!-- Email Input -->
<div class="space-y-unit">
<label class="font-label-sm text-label-sm text-on-surface-variant ml-1" for="email">Email Address</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline text-xl transition-colors group-focus-within:text-primary" data-icon="mail">mail</span>
<input class="w-full h-14 bg-surface-container border border-outline-variant/30 rounded-lg pl-12 pr-4 text-on-surface placeholder:text-outline/50 focus:outline-none focus:border-primary-container focus:ring-1 focus:ring-primary-container transition-all duration-300" id="email" placeholder="name@studio.com" type="email"/>
</div>
</div>
<!-- Password Input -->
<div class="space-y-unit">
<div class="flex justify-between items-center px-1">
<label class="font-label-sm text-label-sm text-on-surface-variant" for="password">Password</label>
<a class="font-label-sm text-label-sm text-primary hover:text-white transition-colors" href="#">Forgot Password?</a>
</div>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline text-xl transition-colors group-focus-within:text-primary" data-icon="lock">lock</span>
<input class="w-full h-14 bg-surface-container border border-outline-variant/30 rounded-lg pl-12 pr-4 text-on-surface placeholder:text-outline/50 focus:outline-none focus:border-primary-container focus:ring-1 focus:ring-primary-container transition-all duration-300" id="password" placeholder="••••••••" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-outline/50 hover:text-on-surface" type="button">
<span class="material-symbols-outlined text-xl" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<!-- Submit Button -->
<div class="pt-2">
<button class="w-full h-14 bg-primary-container text-white font-headline-md rounded-lg flex items-center justify-center gap-2 inner-button-highlight hover:bg-on-primary-fixed-variant active:scale-[0.98] transition-all duration-200 group" type="submit">
                            Login

</button>
