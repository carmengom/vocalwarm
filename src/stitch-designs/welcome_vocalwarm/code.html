<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 200, 'GRAD' 0, 'opsz' 24;
        }
        .diffusion-glow {
            box-shadow: 0 0 60px -15px rgba(107, 79, 187, 0.3);
        }
        .inner-highlight {
            box-shadow: inset 0 1px 0 0 rgba(255, 255, 255, 0.2);
        }
        .glass-surface {
            background: rgba(45, 36, 69, 0.4);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="bg-surface-container-lowest text-on-surface font-body-md min-h-screen flex flex-col overflow-hidden relative">
<!-- Ambient Background Elements -->
<div class="absolute inset-0 z-0 overflow-hidden pointer-events-none">
<div class="absolute -top-[10%] -left-[10%] w-[60%] h-[60%] bg-primary-container/10 rounded-full blur-[120px]"></div>
<div class="absolute top-[20%] -right-[5%] w-[40%] h-[50%] bg-secondary-container/5 rounded-full blur-[100px]"></div>
<!-- Silhouette Stylized Background -->
<div class="absolute bottom-0 right-0 w-full h-full opacity-20 pointer-events-none mix-blend-lighten">
<img alt="stylized silhouette of a soul singer performing in a dimly lit studio with purple ambient stage lighting" class="w-full h-full object-cover object-right-bottom scale-110" data-alt="dramatic silhouette of a soul singer in a hazy, purple-lit studio environment, moody atmosphere with soft light rays" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAjkbik3y52T6HViJe1Z3Vp4zkuKWFkzwsh9D7tlU54a2_O6vlA6DM8Yb8G2HygMkejxJHACWhu2gQpvBwVeODU86sRYAiUHkR3PBixN0CRZAW72O5GGwQ20APXB92dN8JVPZEX-W9BOIO_33_xQaznd0d6qlKhND9WArqrdcRhXaz-O0DQHQP0d8TpiNtuI9ac_RgZWmnSCVxwfPw1xzDBLIdUCJTnYE34A7AO5R8lY6xmXnjoXTswh53z1zeBWf1BdQ_OcVVj7dVz"/>
</div>
</div>
<!-- Top Navigation Bar -->
<header class="relative z-10 bg-transparent flex justify-between items-center w-full px-6 py-4 docked full-width top-0">
<button class="flex items-center justify-center w-10 h-10 rounded-full hover:bg-surface-variant transition-colors duration-300 group">
<span class="material-symbols-outlined text-violet-600 dark:text-violet-400">arrow_back</span>
</button>
<div class="font-epilogue text-sm font-medium tracking-wide text-slate-400">
            Step 1 of 3
        </div>
<button class="font-epilogue text-sm font-medium tracking-wide text-violet-600 dark:text-violet-400 hover:text-violet-300 transition-colors duration-300">
            Skip
        </button>
</header>
<!-- Main Content Canvas -->
<main class="relative z-10 flex-grow flex flex-col px-margin-mobile pt-stack-lg max-w-2xl mx-auto w-full">
<div class="space-y-stack-md">
<div class="space-y-unit">
<span class="text-primary font-label-sm uppercase tracking-[0.2em]">Welcome</span>
<h1 class="font-display-lg text-display-lg text-on-surface">What should we call you?</h1>
<p class="text-on-surface-variant font-body-lg max-w-md">
                    Your name will be displayed on your personal studio profile and progress reports.
                </p>
</div>
<div class="relative mt-stack-lg group">
<input class="w-full bg-[#2D2445] border-transparent rounded-xl p-6 text-headline-md font-headline-md focus:border-primary-container focus:ring-0 focus:outline-none transition-all duration-500 placeholder:text-on-tertiary-fixed-variant/50 text-on-surface diffusion-glow" placeholder="Enter your name" type="text"/>
<div class="absolute right-6 top-1/2 -translate-y-1/2 opacity-0 group-focus-within:opacity-100 transition-opacity">
<span class="material-symbols-outlined text-primary-container">edit</span>
</div>
</div>
<!-- Contextual Hint/Encouragement -->
<div class="flex items-center gap-unit text-on-tertiary-fixed-variant bg-surface-container-low/50 p-4 rounded-lg w-fit">
<span class="material-symbols-outlined text-[20px]">auto_awesome</span>
<p class="text-label-sm">This is how your coach will address you.</p>
</div>
</div>
</main>
<!-- Fixed Bottom Action Area -->
<footer class="relative z-10 p-margin-mobile flex flex-col items-center gap-stack-md max-w-2xl mx-auto w-full">
<button class="w-full bg-primary-container text-on-primary-container font-headline-md py-5 rounded-xl diffusion-glow inner-highlight active:scale-[0.98] transition-all duration-200 flex items-center justify-center gap-unit">
            Continue
            <span class="material-symbols-outlined">chevron_right</span>
</button>
<!-- Progress Indicator Dots -->
<div class="flex gap-2 pb-4">
<div class="h-1.5 w-8 rounded-full bg-primary-container"></div>
<div class="h-1.5 w-1.5 rounded-full bg-surface-variant"></div>
<div class="h-1.5 w-1.5 rounded-full bg-surface-variant"></div>
</div>
</footer>
<!-- Subtle Grain Overlay for Texture -->
<div class="fixed inset-0 pointer-events-none opacity-[0.03] mix-blend-overlay bg-[url('https://www.transparenttextures.com/patterns/natural-paper.png')]"></div>
